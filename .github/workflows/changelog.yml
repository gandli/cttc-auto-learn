name: Update Changelog

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        run: |
          python3 - <<'PYEOF'
          import subprocess, re, os
          from datetime import datetime

          # Get current tag
          tag = subprocess.check_output(
              ["git", "describe", "--tags", "--exact-match"],
              text=True
          ).strip()

          # Get previous tag
          tags = subprocess.check_output(
              ["git", "tag", "--sort=-v:refname"],
              text=True
          ).strip().split("\n")
          prev_tag = None
          for t in tags:
              if t != tag:
                  prev_tag = t
                  break

          # Get commits between tags
          if prev_tag:
              log = subprocess.check_output(
                  ["git", "log", f"{prev_tag}..{tag}", "--oneline", "--no-merges", "--reverse"],
                  text=True
              ).strip()
          else:
              log = subprocess.check_output(
                  ["git", "log", tag, "--oneline", "--no-merges", "--reverse"],
                  text=True
              ).strip()

          if not log:
              print("No commits found")
              exit(0)

          # Parse commits and categorize by type
          categories = {
              "新增": [],      # feat:
              "变更": [],      # refactor:, style:, chore:, perf:
              "修复": [],      # fix:
              "文档": [],      # docs:
              "测试": [],      # test:
              "其他": [],      # everything else
          }

          for line in log.split("\n"):
              m = re.match(r'^[a-f0-9]+\s+(.*)', line)
              if not m:
                  continue
              raw_msg = m.group(1).strip()

              # Categorize by original message prefix
              if any(raw_msg.startswith(p) for p in ['feat:', 'feat(']):
                  cat = "新增"
              elif any(raw_msg.startswith(p) for p in ['fix:', 'fix(']):
                  cat = "修复"
              elif any(raw_msg.startswith(p) for p in ['docs:', 'docs(']):
                  cat = "文档"
              elif any(raw_msg.startswith(p) for p in ['refactor:', 'refactor(', 'style:', 'style(', 'perf:', 'perf(']):
                  cat = "变更"
              elif any(raw_msg.startswith(p) for p in ['test:', 'test(']):
                  cat = "测试"
              else:
                  cat = "其他"

              # Remove conventional commit prefix for display
              msg = re.sub(r'^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+?\))?!?:\s*', '', raw_msg)
              categories[cat].append(msg)

          # Get tag date
          date = subprocess.check_output(
              ["git", "log", "-1", "--format=%ai", tag],
              text=True
          ).strip().split()[0]

          # Build new section (Keep a Changelog format)
          version = tag.lstrip('v')
          new_section = f"\n## [{version}] - {date}\n\n"

          for cat_name, items in categories.items():
              if items:
                  new_section += f"### {cat_name}\n"
                  for item in items:
                      new_section += f"- {item}\n"
                  new_section += "\n"

          # Read existing changelog
          if os.path.exists("CHANGELOG.md"):
              with open("CHANGELOG.md", newline="") as f:
                  content = f.read()
          else:
              content = "# Changelog\n\n本项目所有重要更改都记录在此文件。\n\n格式基于 [Keep a Changelog](https://keepachangelog.com/zh-CN/1.1.0/)，\n并且本项目遵循 [语义化版本](https://semver.org/lang/zh-CN/)。\n"

          # Insert after header (first ## line or end of header)
          lines = content.split("\n")
          insert_idx = 0
          for i, line in enumerate(lines):
              if line.startswith("## ["):
                  insert_idx = i
                  break
              elif line.startswith("# "):
                  # Find end of header description
                  insert_idx = i + 1
                  while insert_idx < len(lines) and not lines[insert_idx].startswith("#"):
                      insert_idx += 1

          lines.insert(insert_idx, new_section.rstrip())

          with open("CHANGELOG.md", "w", newline="\n") as f:
              f.write("\n".join(lines))

          print(f"Added changelog for {tag}")
          PYEOF

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME} [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin main
