name: Update Changelog

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | head -n1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          TAG=${{ steps.latest_tag.outputs.tag }}
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log $TAG --oneline --no-merges --reverse)
          else
            LOG=$(git log ${PREV_TAG}..${TAG} --oneline --no-merges --reverse)
          fi

          # Extract commit hashes already in CHANGELOG.md
          EXISTING=""
          if [ -f CHANGELOG.md ]; then
            EXISTING=$(grep -oE '^[a-f0-9]{7,}' CHANGELOG.md || true)
          fi

          # Filter out commits already listed
          NEW_COMMITS=""
          while IFS= read -r line; do
            HASH=$(echo "$line" | grep -oE '^[a-f0-9]{7,}')
            if [ -n "$HASH" ] && ! echo "$EXISTING" | grep -q "$HASH"; then
              NEW_COMMITS="${NEW_COMMITS}${line}\n"
            fi
          done <<< "$LOG"

          # If no new commits, skip
          if [ -z "$(echo -e "$NEW_COMMITS" | tr -d '[:space:]')" ]; then
            echo "No new commits to add"
            exit 0
          fi

          # Build new section
          DATE=$(git log -1 --format=%ai $TAG | cut -d' ' -f1)
          {
            echo "## $TAG ($DATE)"
            echo ""
            echo -e "$NEW_COMMITS" | while IFS= read -r line; do
              [ -n "$line" ] && echo "- $line"
            done
            echo ""
          } > /tmp/new_section.md

          # Insert after "# Changelog" header
          if [ -f CHANGELOG.md ] && head -1 CHANGELOG.md | grep -q "^# Changelog"; then
            # Insert new section after header
            sed -i '2r /tmp/new_section.md' CHANGELOG.md
          else
            # Create new changelog
            {
              echo "# Changelog"
              echo ""
              cat /tmp/new_section.md
            } > CHANGELOG.md
          fi

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md [skip ci]" || exit 0
          git pull --rebase
          git push
