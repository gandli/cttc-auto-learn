name: Update Changelog

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | head -n1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        run: |
          python3 - <<'PYEOF'
          import subprocess, re, os

          tag = "${{ steps.latest_tag.outputs.tag }}"

          # Get previous tag
          tags = subprocess.check_output(
              ["git", "tag", "--sort=-v:refname"],
              text=True
          ).strip().split("\n")
          prev_tag = tags[1] if len(tags) > 1 else None

          # Get commits between tags
          if prev_tag:
              log = subprocess.check_output(
                  ["git", "log", f"{prev_tag}..{tag}", "--oneline", "--no-merges", "--reverse"],
                  text=True
              ).strip()
          else:
              log = subprocess.check_output(
                  ["git", "log", tag, "--oneline", "--no-merges", "--reverse"],
                  text=True
              ).strip()

          if not log:
              print("No commits found")
              exit(0)

          # Read existing changelog
          existing_hashes = set()
          if os.path.exists("CHANGELOG.md"):
              with open("CHANGELOG.md", newline="") as f:
                  content = f.read()
              # Normalize line endings for regex
              content = content.replace("\r\n", "\n").replace("\r", "\n")
              existing_hashes = set(re.findall(r'^[a-f0-9]{7,}', content, re.MULTILINE))

          print(f"Existing hashes: {existing_hashes}")

          # Filter new commits
          new_lines = []
          for line in log.split("\n"):
              m = re.match(r'^([a-f0-9]{7,})\s+(.*)', line)
              if m:
                  hash_, msg = m.group(1), m.group(2)
                  if hash_ not in existing_hashes:
                      new_lines.append(f"- {hash_} {msg}")

          if not new_lines:
              print("No new commits to add")
              exit(0)

          # Get tag date
          date = subprocess.check_output(
              ["git", "log", "-1", "--format=%ai", tag],
              text=True
          ).strip().split()[0]

          # Build new section
          new_section = f"\n## {tag} ({date})\n\n" + "\n".join(new_lines) + "\n"

          # Insert into changelog
          if os.path.exists("CHANGELOG.md"):
              with open("CHANGELOG.md", newline="") as f:
                  lines = f.readlines()
              # Normalize line endings
              lines = [l.replace("\r\n", "\n").replace("\r", "\n") for l in lines]
              # Insert after first "# Changelog" line
              for i, line in enumerate(lines):
                  if line.startswith("# Changelog"):
                      lines.insert(i + 1, new_section)
                      break
              else:
                  lines.append(new_section)
              with open("CHANGELOG.md", "w", newline="\n") as f:
                  f.writelines(lines)
          else:
              with open("CHANGELOG.md", "w", newline="\n") as f:
                  f.write(f"# Changelog\n{new_section}")

          print(f"Added {len(new_lines)} new commits")
          PYEOF

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md [skip ci]" || exit 0
          git pull --rebase
          git push
