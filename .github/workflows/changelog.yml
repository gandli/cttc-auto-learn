name: Update Changelog

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | head -n1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        run: |
          TAG=${{ steps.latest_tag.outputs.tag }}
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            # Only one tag — list all commits
            LOG=$(git log $TAG --oneline --no-merges --reverse)
          else
            # Commits between previous and latest tag
            LOG=$(git log ${PREV_TAG}..${TAG} --oneline --no-merges --reverse)
          fi

          # Build changelog
          {
            echo "# Changelog"
            echo ""
            echo "## $TAG ($(git log -1 --format=%ai $TAG | cut -d' ' -f1))"
            echo ""
            echo "$LOG" | while read -r line; do
              echo "- $line"
            done
          } > /tmp/changelog_new.md

          # Append old changelog content (skip header)
          if [ -f CHANGELOG.md ]; then
            tail -n +2 CHANGELOG.md >> /tmp/changelog_new.md
          fi

          mv /tmp/changelog_new.md CHANGELOG.md

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md [skip ci]" || exit 0
          git pull --rebase
          git push
